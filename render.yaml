services:
  - type: web
    name: macro-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: FRED_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.7"
